<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Database Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-layout">
        <main class="glass-container">
            <header>
                <h1>Admin<span class="gradient-text">Panel</span></h1>
                <p>Kelola file database aplikasi Anda.</p>
            </header>

            <section class="admin-section">
                <!-- Upload Form -->
                <div class="upload-container">
                    <input type="file" id="dbFileInput" class="hidden-input" accept=".txt">
                    <button id="uploadBtn" class="upload-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                        UPLOAD NEW DATABASE
                    </button>
                    <div id="uploadStatus" class="stats"></div>
                </div>

                <!-- Paste Form -->
                <div class="paste-container">
                    <div class="input-group">
                        <input type="text" id="pasteDbName" placeholder="Database Name (e.g., customers)" class="modern-input">
                    </div>
                    <textarea id="pasteDbContent" placeholder="Paste numbers here, one per line..." class="modern-textarea"></textarea>
                    <button id="pasteBtn" class="upload-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                        SAVE DATABASE
                    </button>
                    <div id="pasteStatus" class="stats"></div>
                </div>

                <!-- Database List -->
                <div class="db-list-container">
                    <h3>Active Databases</h3>
                    <div id="dbList" class="db-list">
                        <!-- Databases will be injected here -->
                    </div>
                </div>
            </section>
            
            <div class="back-link-container">
                 <a href="/" class="back-link">&larr; Back to App</a>
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
