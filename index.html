<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Tracker - Database Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-layout">
        <!-- Main Content -->
        <main class="glass-container">

            <div id="regionSelector" class="region-selector hidden">
                <!-- Region flags will be injected here -->
            </div>

            <section class="results-section">
                <div id="singleNumberContainer" class="single-number-container">
                    <!-- Single number card will be injected here -->
                </div>
                
                <div id="loadingState" class="loading-state hidden">
                    <div class="spinner"></div>
                    <p>Mencari nomor baru...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
